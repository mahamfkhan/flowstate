<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>flowstate</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%231a3a5c'/%3E%3C!-- sky --%3E%3Crect width='32' height='18' fill='%23c8d8e8'/%3E%3C!-- fuji --%3E%3Cpolygon points='16,4 20,13 12,13' fill='%23e8e0d8'/%3E%3Cpolygon points='16,4 17.5,7 14.5,7' fill='white'/%3E%3C!-- ocean base --%3E%3Crect y='14' width='32' height='18' fill='%231a3a5c'/%3E%3C!-- main wave body --%3E%3Cellipse cx='8' cy='16' rx='10' ry='7' fill='%231e4a7a'/%3E%3Cellipse cx='24' cy='18' rx='10' ry='6' fill='%231e4a7a'/%3E%3C!-- wave middle layer --%3E%3Cellipse cx='16' cy='20' rx='12' ry='5' fill='%23245a8a'/%3E%3C!-- wave claw - left big wave --%3E%3Cpath d='M0,13 Q4,6 8,11 Q4,11 2,14 Z' fill='%231e4a7a'/%3E%3Cpath d='M0,12 Q4,5 8,10 Q5,9 3,12 Z' fill='%23245a8a'/%3E%3C!-- white foam tips left --%3E%3Cpath d='M0,12 Q2,8 5,10 Q3,10 1,13 Z' fill='white' opacity='0.9'/%3E%3Cpath d='M4,10 Q6,7 8,9 Q6,9 5,11 Z' fill='white' opacity='0.85'/%3E%3C!-- right claw --%3E%3Cpath d='M22,10 Q26,5 30,9 Q28,9 26,12 Z' fill='%231e4a7a'/%3E%3C!-- white foam tips right --%3E%3Cpath d='M22,10 Q25,6 28,9 Q26,9 24,11 Z' fill='white' opacity='0.9'/%3E%3Cpath d='M26,8 Q28,5 30,7 Q29,8 27,10 Z' fill='white' opacity='0.85'/%3E%3C!-- small claw mid --%3E%3Cpath d='M12,12 Q14,8 17,11 Q15,11 13,13 Z' fill='%231e4a7a'/%3E%3Cpath d='M12,11 Q14,7 17,10 Q15,10 13,12 Z' fill='white' opacity='0.8'/%3E%3C!-- foreground water --%3E%3Cpath d='M0,24 Q8,20 16,24 Q24,28 32,24 L32,32 L0,32 Z' fill='%231a3a5c'/%3E%3Cpath d='M0,26 Q8,22 16,26 Q24,30 32,26 L32,32 L0,32 Z' fill='%23152d47'/%3E%3C/svg%3E" />
<style>
  :root {
    --bg: #0e0e10;
    --bg-elev: #18181b;
    --bg-elev2: #1e1e23;
    --border: #2a2a30;
    --text: #ececf1;
    --text-dim: #8a8a93;
    --accent: #7c5cff;
    --pill-bg: #1f1f24;
    --pill-bg-hover: #26262d;
    --danger: #ff6b6b;
    --green: #4ac49a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Page ─────────────────────────────────────── */
  .page {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 18px 18px 0;
    gap: 14px;
  }

  /* ── Top bar ──────────────────────────────────── */
  .top-bar { flex-shrink: 0; display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 16px; font-weight: 700; letter-spacing: -0.03em; }
  .logo span { color: var(--accent); }

  /* Star mode controls */
  .star-trigger-btn {
    font-family: inherit; cursor: pointer; border: none;
    border-radius: 999px; font-size: 12px; font-weight: 600;
    padding: 5px 13px; white-space: nowrap;
    background: rgba(255,196,40,0.1); color: #ffc428;
    transition: background 0.15s ease;
  }
  .star-trigger-btn:hover { background: rgba(255,196,40,0.2); }

  .star-done-btn {
    font-family: inherit; cursor: pointer; border: none;
    border-radius: 999px; font-size: 12px; font-weight: 600;
    padding: 5px 13px; white-space: nowrap;
    background: #ffc428; color: #0a0a0c;
    transition: opacity 0.15s ease;
  }
  .star-done-btn:hover { opacity: 0.82; }

  /* Star toggle on pills (star mode only) */
  .star-btn {
    flex-shrink: 0;
    background: transparent; border: none;
    cursor: pointer; font-size: 13px; line-height: 1;
    padding: 1px 2px; border-radius: 3px;
    color: var(--text-dim);
    transition: color 0.12s ease;
    margin-top: 1px;
  }
  .star-btn:hover  { color: #ffc428; }
  .star-btn.active { color: #ffc428; }

  /* Starred glow on pills */
  .pill.starred {
    border-color: rgba(255,196,40,0.38);
    box-shadow: 0 0 0 1px rgba(255,196,40,0.08), 0 0 12px rgba(255,196,40,0.16);
    background: rgba(255,196,40,0.03);
  }
  .pill.starred:hover { background: rgba(255,196,40,0.06); }

  /* ── Board ────────────────────────────────────── */
  .board {
    flex: 1;
    display: flex;
    gap: 14px;
    min-height: 0;
  }

  /* ── Base column ──────────────────────────────── */
  .col {
    display: flex;
    flex-direction: column;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--bg-elev);
    overflow: hidden;
    transition: border-color 0.15s ease;
  }
  .col.drag-over { border-color: rgba(124,92,255,0.55); }
  .col.braindump { flex: 0 0 230px; }

  /* ── Categories ───────────────────────────────── */
  .categories { flex: 1; display: flex; gap: 14px; min-height: 0; }
  .col[data-col="mit"] { flex: 1; }

  /* ── Habits group ─────────────────────────────── */
  .habits-group {
    flex: 1.5;
    display: flex;
    flex-direction: column;
    gap: 9px;
    min-height: 0;
  }
  .habits-group-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    padding: 0 2px;
  }
  .group-label {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--text-dim);
  }
  .habits-cols { flex: 1; display: flex; gap: 14px; min-height: 0; }
  .habits-cols .col { flex: 1; }

  /* ── One-off (was quickwins, standalone) ─────── */
  .col[data-col="quickwins"] { flex: 1; }

  /* ── Stock buttons ────────────────────────────── */
  .take-stock-btn, .done-btn, .edit-stock-btn {
    font-family: inherit; cursor: pointer; border: none;
    border-radius: 999px; font-size: 11px; font-weight: 600;
    padding: 5px 11px; transition: background 0.15s ease, opacity 0.15s ease;
    white-space: nowrap;
  }
  .take-stock-btn { background: rgba(124,92,255,0.14); color: var(--accent); }
  .take-stock-btn:hover { background: rgba(124,92,255,0.26); }
  .done-btn { background: var(--green); color: #0a0a0c; }
  .done-btn:hover { opacity: 0.82; }
  .edit-stock-btn { background: rgba(74,196,154,0.14); color: var(--green); }
  .edit-stock-btn:hover { background: rgba(74,196,154,0.26); }

  /* Progress summary */
  .stock-result { display: flex; align-items: center; gap: 9px; }
  .progress-bar-wrap { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .progress-label { font-size: 11px; color: var(--text-dim); white-space: nowrap; }

  /* ── Column header ────────────────────────────── */
  .col-header {
    flex-shrink: 0; display: flex; align-items: baseline; gap: 6px;
    padding: 12px 13px 10px; border-bottom: 1px solid var(--border);
  }
  .col-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.09em; color: var(--text-dim); }
  .col-count { font-size: 11px; color: var(--text-dim); opacity: 0.45; }

  .col[data-col="mit"]          .col-title { color: #e8904a; }
  .col[data-col="ongoing"]      .col-title { color: #4ac49a; }
  .col[data-col="aspirational"] .col-title { color: #b46ae8; }
  .col[data-col="quickwins"]    .col-title { color: #4a9de8; }

  /* ── Input ────────────────────────────────────── */
  .col-input-wrap { flex-shrink: 0; padding: 8px 9px; border-bottom: 1px solid var(--border); }
  .col-input {
    width: 100%; background: transparent; border: 1px solid var(--border);
    color: var(--text); font-size: 13px; padding: 7px 12px; border-radius: 999px;
    outline: none; font-family: inherit; transition: border-color 0.15s ease;
  }
  .col-input::placeholder { color: var(--text-dim); }
  .col-input:focus { border-color: var(--accent); }

  /* ── Column body ──────────────────────────────── */
  .col-body {
    flex: 1; overflow-y: auto; padding: 8px;
    display: flex; flex-direction: column; gap: 6px; min-height: 0;
  }
  .col-body::-webkit-scrollbar { width: 3px; }
  .col-body::-webkit-scrollbar-track { background: transparent; }
  .col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Pills ────────────────────────────────────── */
  .pill {
    display: flex; align-items: flex-start; gap: 6px;
    background: var(--pill-bg); border: 1px solid var(--border); color: var(--text);
    padding: 7px 7px 7px 10px; border-radius: 9px; font-size: 13px; line-height: 1.4;
    word-break: break-word; cursor: grab; user-select: none;
    animation: pop 0.13s ease-out; transition: background 0.1s ease, opacity 0.15s ease;
  }
  .pill:hover  { background: var(--pill-bg-hover); }
  .pill:active { cursor: grabbing; }
  .pill.dragging { opacity: 0.18; }
  .pill .text { flex: 1; white-space: pre-wrap; padding-top: 1px; }

  .pill .x {
    flex-shrink: 0; background: transparent; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 14px; line-height: 1; width: 18px; height: 18px;
    border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
    transition: color 0.1s ease, background 0.1s ease; margin-top: 2px;
  }
  .pill .x:hover { color: var(--danger); background: rgba(255,107,107,0.1); }

  /* Tick button */
  .tick-btn {
    flex-shrink: 0; width: 16px; height: 16px; border-radius: 50%;
    border: 1.5px solid var(--border); background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: transparent;
    transition: all 0.15s ease; margin-top: 3px; padding: 0; line-height: 1;
  }
  .tick-btn:hover { border-color: var(--green); }
  .tick-btn.ticked { background: var(--green); border-color: var(--green); color: #0a0a0c; }

  /* ── Drop line ────────────────────────────────── */
  .drop-line {
    flex-shrink: 0; height: 2px; background: var(--accent);
    border-radius: 1px; pointer-events: none;
  }

  /* ── Empty hint ───────────────────────────────── */
  .empty-hint {
    flex: 1; display: flex; align-items: center; justify-content: center;
    color: var(--text-dim); font-size: 12px; opacity: 0.38;
    pointer-events: none; user-select: none; text-align: center; padding: 10px;
  }

  /* ── Archive bin tray ─────────────────────────── */
  .bin-tray {
    flex-shrink: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    border-radius: 14px 14px 0 0;
    overflow: hidden;
  }

  .bin-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    cursor: pointer;
    user-select: none;
  }
  .bin-header:hover { background: var(--bg-elev2); }

  .bin-icon { font-size: 13px; opacity: 0.5; }

  .bin-title {
    font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.09em;
    color: var(--text-dim);
  }

  .bin-count {
    font-size: 11px; color: var(--text-dim); opacity: 0.5;
    background: var(--bg-elev2);
    padding: 1px 7px; border-radius: 999px;
    border: 1px solid var(--border);
  }

  .bin-chevron {
    margin-left: auto;
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.4;
    transition: transform 0.2s ease;
  }
  .bin-tray.open .bin-chevron { transform: rotate(180deg); }

  /* Bin body — hidden when closed */
  .bin-body {
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    padding: 2px 12px 12px;
    max-height: 140px;
    overflow-y: auto;
  }
  .bin-tray.open .bin-body { display: flex; }

  .bin-body::-webkit-scrollbar { width: 3px; }
  .bin-body::-webkit-scrollbar-track { background: transparent; }
  .bin-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Archived item pill */
  .archive-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--pill-bg);
    border: 1px solid var(--border);
    padding: 5px 6px 5px 8px;
    border-radius: 8px;
    font-size: 12px;
    max-width: 280px;
    cursor: grab;
    user-select: none;
    transition: opacity 0.15s ease;
  }
  .archive-pill:active { cursor: grabbing; }
  .archive-pill.dragging { opacity: 0.2; }

  .archive-tag {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    opacity: 0.75;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .archive-text {
    color: var(--text-dim);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .unarchive-btn {
    flex-shrink: 0;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    padding: 1px 3px;
    border-radius: 4px;
    transition: color 0.1s ease, background 0.1s ease;
    line-height: 1;
  }
  .unarchive-btn:hover { color: var(--text); background: var(--bg-elev2); }

  .bin-empty {
    font-size: 12px; color: var(--text-dim); opacity: 0.4;
    padding: 4px 0 8px; user-select: none;
  }

  /* ── Maximise button (braindump header) ──────── */
  .maximise-btn {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 4px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.5;
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  .maximise-btn:hover { opacity: 1; background: var(--bg-elev2); }

  /* ── Dump view (fullscreen brainstorm mode) ───── */
  .dump-view {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    padding: 72px 24px 120px;
    overflow-y: auto;
  }
  .dump-view.active { display: flex; }

  .dump-back {
    position: fixed;
    top: 20px;
    left: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
  }
  .dump-back:hover { color: var(--text); border-color: var(--text-dim); }

  .dump-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .dump-header h1 {
    font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .dump-header p { margin: 0; color: var(--text-dim); font-size: 15px; }

  .dump-input-wrap { width: 100%; max-width: 600px; margin-bottom: 28px; }

  .dump-input {
    width: 100%;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 16px;
    padding: 16px 22px;
    border-radius: 999px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .dump-input::placeholder { color: var(--text-dim); }
  .dump-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(124,92,255,0.12);
  }

  .dump-pills {
    width: 100%; max-width: 680px;
    display: flex; flex-wrap: wrap;
    gap: 9px; justify-content: center;
  }

  .dump-pill {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--pill-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 12px 9px 16px;
    border-radius: 999px;
    font-size: 14px; line-height: 1.3;
    word-break: break-word;
    animation: pop 0.15s ease-out;
    transition: background 0.1s ease;
  }
  .dump-pill:hover { background: var(--pill-bg-hover); }
  .dump-pill .text { white-space: pre-wrap; }
  .dump-pill .x { margin-top: 0; }

  /* ── Animations ───────────────────────────────── */
  @keyframes pop {
    from { transform: scale(0.93); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="top-bar">
    <div class="logo">flow<span>state</span></div>
    <div id="star-controls"></div>
  </div>

  <div id="board-root" style="display:contents">
  <div class="board">

    <!-- ── Brain Dump ── -->
    <div class="col braindump" data-col="braindump">
      <div class="col-header">
        <span class="col-title">Brain Dump</span>
        <span class="col-count" id="count-braindump"></span>
        <button class="maximise-btn" id="maximise-btn" title="Focus mode">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4.5V1h3.5M7.5 1H11v3.5M11 7.5V11H7.5M4.5 11H1V7.5"/>
          </svg>
        </button>
      </div>
      <div class="col-input-wrap">
        <input id="entry" class="col-input" type="text"
          placeholder="what's on your mind?" autocomplete="off" autofocus />
      </div>
      <div class="col-body" id="body-braindump"></div>
    </div>

    <div class="categories">

      <!-- ── Urgent / Important ── -->
      <div class="col" data-col="mit">
        <div class="col-header">
          <span class="col-title">Urgent / Important</span>
          <span class="col-count" id="count-mit"></span>
        </div>
        <div class="col-body" id="body-mit"></div>
      </div>

      <!-- ── Habits group ── -->
      <div class="habits-group">
        <div class="habits-group-header">
          <span class="group-label">Habits &amp; Repeats</span>
          <div id="stock-controls"></div>
        </div>
        <div class="habits-cols">
          <div class="col" data-col="ongoing">
            <div class="col-header">
              <span class="col-title">Ongoing</span>
              <span class="col-count" id="count-ongoing"></span>
            </div>
            <div class="col-body" id="body-ongoing"></div>
          </div>
          <div class="col" data-col="aspirational">
            <div class="col-header">
              <span class="col-title">Aspirational</span>
              <span class="col-count" id="count-aspirational"></span>
            </div>
            <div class="col-body" id="body-aspirational"></div>
          </div>
        </div>
      </div>

      <!-- ── One-off Activities ── -->
      <div class="col" data-col="quickwins">
        <div class="col-header">
          <span class="col-title">One-off Activities</span>
          <span class="col-count" id="count-quickwins"></span>
        </div>
        <div class="col-body" id="body-quickwins"></div>
      </div>

    </div>
  </div>

  <!-- ── Archive bin tray ── -->
  <div class="bin-tray" id="bin-tray">
    <div class="bin-header" id="bin-header">
      <span class="bin-icon">▾</span>
      <span class="bin-title">Archive</span>
      <span class="bin-count" id="bin-count" style="display:none"></span>
      <span class="bin-chevron" id="bin-chevron">▲</span>
    </div>
    <div class="bin-body" id="bin-body"></div>
  </div>
  </div><!-- /board-root -->

  <!-- ── Dump view overlay ── -->
  <div class="dump-view" id="dump-view">
    <button class="dump-back" id="dump-back">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.5 1H1v3.5M7.5 11H11V7.5M11 4.5V1H7.5M1 7.5V11h3.5"/>
      </svg>
      back to board
    </button>
    <div class="dump-header">
      <h1>brain dump</h1>
      <p>get it out of your head. one thought at a time.</p>
    </div>
    <div class="dump-input-wrap">
      <input id="dump-entry" class="dump-input" type="text"
        placeholder="what's on your mind?" autocomplete="off" />
    </div>
    <div id="dump-pills" class="dump-pills"></div>
  </div>

</div>

<script>
  // ─────────────────────────────────────────────────
  //  Storage
  // ─────────────────────────────────────────────────
  const OLD_KEY   = 'flowstate.braindump.v1';
  const BOARD_KEY = 'flowstate.board.v1';

  const COLS = ['braindump', 'mit', 'ongoing', 'aspirational', 'quickwins'];

  const HINTS = {
    braindump:    'press enter to add a thought',
    mit:          'drag urgent & important tasks here',
    ongoing:      'drag regular habits here',
    aspirational: 'drag aspirational habits here',
    quickwins:    'drag one-off activities here',
  };

  // Column display metadata for archive labels
  // onetime kept for displaying old archived items from that column
  const COL_META = {
    ongoing:      { label: 'Ongoing',      color: '#4ac49a' },
    aspirational: { label: 'Aspirational', color: '#b46ae8' },
    mit:          { label: 'Urgent',       color: '#e8904a' },
    quickwins:    { label: 'One-off',      color: '#4a9de8' },
    onetime:      { label: 'One-time',     color: '#e84a7a' },
    braindump:    { label: 'Dump',         color: '#8a8a93' },
  };

  function emptyBoard() {
    return {
      braindump: [], mit: [], ongoing: [], aspirational: [],
      quickwins: [], stock: null, archive: [], starred: [],
    };
  }

  function loadBoard() {
    try {
      const legacy = localStorage.getItem(OLD_KEY);
      if (legacy) {
        const arr = JSON.parse(legacy);
        if (Array.isArray(arr)) {
          const b = { ...emptyBoard(), braindump: arr };
          localStorage.setItem(BOARD_KEY, JSON.stringify(b));
          localStorage.removeItem(OLD_KEY);
          return b;
        }
      }
    } catch {}
    try {
      const raw = localStorage.getItem(BOARD_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        const b = { ...emptyBoard(), ...parsed };
        // Migrate old 'habits' → ongoing
        if (parsed.habits) {
          b.ongoing = [...(parsed.habits || []), ...(b.ongoing || [])];
          delete b.habits;
        }
        // Migrate removed 'onetime' column → archive
        if (parsed.onetime && parsed.onetime.length > 0) {
          parsed.onetime.forEach(text => {
            b.archive.push({ text, colId: 'onetime', date: todayISO(), source: 'deleted' });
          });
          delete b.onetime;
        }
        return b;
      }
    } catch {}
    return emptyBoard();
  }

  function saveBoard() {
    localStorage.setItem(BOARD_KEY, JSON.stringify(board));
  }

  let board = loadBoard();

  // ─────────────────────────────────────────────────
  //  Stars
  // ─────────────────────────────────────────────────
  let starMode   = false;
  let starredSet = new Set(board.starred || []);

  function starKey(colId, text) { return `${colId}:${text}`; }
  function isStarred(colId, text) { return starredSet.has(starKey(colId, text)); }

  function toggleStar(colId, text) {
    const key = starKey(colId, text);
    starredSet.has(key) ? starredSet.delete(key) : starredSet.add(key);
    board.starred = [...starredSet];
    saveBoard();
  }

  function renderStarControls() {
    const ctrl = document.getElementById('star-controls');
    ctrl.innerHTML = '';
    if (!starMode) {
      const btn = document.createElement('button');
      btn.className   = 'star-trigger-btn';
      btn.textContent = '★  Star items';
      btn.addEventListener('click', () => {
        starMode = true;
        render();
        renderStarControls();
      });
      ctrl.appendChild(btn);
    } else {
      const btn = document.createElement('button');
      btn.className   = 'star-done-btn';
      btn.textContent = 'Done';
      btn.addEventListener('click', () => {
        starMode = false;
        render();
        renderStarControls();
      });
      ctrl.appendChild(btn);
    }
  }

  // ─────────────────────────────────────────────────
  //  Date helpers
  // ─────────────────────────────────────────────────
  function todayISO() { return new Date().toISOString().slice(0, 10); }

  function todayLabel() {
    return new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
  }

  // ─────────────────────────────────────────────────
  //  Daily archive reset — runs at startup
  //  Only stock-archived habit items return to columns next day.
  //  Manually deleted items (source:'deleted') stay in archive forever.
  // ─────────────────────────────────────────────────
  function dailyReset() {
    const today = todayISO();
    if (!board.archive || board.archive.length === 0) return;

    const toRestore = board.archive.filter(a => a.source === 'stock' && a.date !== today);
    if (toRestore.length === 0) return;

    toRestore.forEach(a => {
      if (board[a.colId]) board[a.colId].push(a.text);
    });
    board.archive = board.archive.filter(a => !(a.source === 'stock' && a.date !== today));
    saveBoard();
  }

  dailyReset();

  // ─────────────────────────────────────────────────
  //  Stock session   state: null | 'active' | 'done'
  // ─────────────────────────────────────────────────
  let stock = initStock();

  function initStock() {
    const today = todayISO();
    const s = board.stock;
    if (s && s.date === today) {
      return {
        date:    s.date,
        checked: new Set(s.checked || []),
        state:   s.state || null,
        summary: s.summary || null,
      };
    }
    return { date: today, checked: new Set(), state: null, summary: null };
  }

  function persistStock() {
    board.stock = {
      date:    stock.date,
      checked: [...stock.checked],
      state:   stock.state,
      summary: stock.summary,
    };
    saveBoard();
  }

  function isHabitCol(colId) { return colId === 'ongoing' || colId === 'aspirational'; }
  function stockKey(colId, text) { return `${colId}:${text}`; }
  function habitTotal() { return board.ongoing.length + board.aspirational.length; }
  function habitDone()  { return stock.checked.size; }

  // ─────────────────────────────────────────────────
  //  Archive helpers
  // ─────────────────────────────────────────────────
  function archiveCheckedItems() {
    const today = todayISO();
    ['ongoing', 'aspirational'].forEach(colId => {
      const keep = [], archive = [];
      board[colId].forEach(text => {
        const key = stockKey(colId, text);
        (stock.checked.has(key) ? archive : keep).push(text);
      });
      board[colId] = keep;
      archive.forEach(text => {
        board.archive.push({ text, colId, date: today, source: 'stock' });
      });
    });
  }

  function unarchive(idx) {
    const item = board.archive[idx];
    if (!item) return;
    board.archive.splice(idx, 1);
    stock.checked.delete(stockKey(item.colId, item.text));
    board[item.colId].push(item.text);
    persistStock();
    renderCol(item.colId);
    renderBin();
  }

  function permanentDelete(idx) {
    const item = board.archive[idx];
    if (item) {
      starredSet.delete(starKey(item.colId, item.text));
      board.starred = [...starredSet];
    }
    board.archive.splice(idx, 1);
    saveBoard();
    renderBin();
  }

  // ─────────────────────────────────────────────────
  //  Drag state
  // ─────────────────────────────────────────────────
  let drag       = null;
  let dropTarget = null;

  function clearDropLine() {
    document.querySelectorAll('.drop-line').forEach(el => el.remove());
    dropTarget = null;
  }

  function showDropLine(body, insertIndex, colId) {
    clearDropLine();
    const pills = [...body.querySelectorAll('.pill:not(.dragging)')];
    const line  = document.createElement('div');
    line.className = 'drop-line';
    insertIndex >= pills.length ? body.appendChild(line) : body.insertBefore(line, pills[insertIndex]);
    dropTarget = { colId, insertIndex };
  }

  function getInsertIndex(body, clientY) {
    const pills = [...body.querySelectorAll('.pill:not(.dragging)')];
    for (let i = 0; i < pills.length; i++) {
      const r = pills[i].getBoundingClientRect();
      if (clientY < r.top + r.height / 2) return i;
    }
    return pills.length;
  }

  // ─────────────────────────────────────────────────
  //  Build a pill element
  // ─────────────────────────────────────────────────
  function makePill(text, colId, index) {
    const pill = document.createElement('div');
    pill.className = 'pill';
    pill.draggable = true;

    // Habit columns: tick buttons in active mode, grey-out in done mode
    if (isHabitCol(colId) && stock.state !== null) {
      const key       = stockKey(colId, text);
      const isChecked = stock.checked.has(key);
      if (isChecked) pill.classList.add('checked');

      if (stock.state === 'active') {
        const tick = document.createElement('button');
        tick.className = 'tick-btn' + (isChecked ? ' ticked' : '');
        tick.setAttribute('aria-label', 'toggle done');
        tick.textContent = isChecked ? '✓' : '';
        tick.addEventListener('click', (e) => {
          e.stopPropagation();
          stock.checked.has(key) ? stock.checked.delete(key) : stock.checked.add(key);
          persistStock();
          renderCol(colId);
          renderStockControls();
        });
        pill.appendChild(tick);
      }
    }

    // Starred glow — always applied
    if (isStarred(colId, text)) pill.classList.add('starred');

    const span = document.createElement('span');
    span.className = 'text';
    span.textContent = text;

    // Star toggle — only visible in star mode
    if (starMode) {
      const starred = isStarred(colId, text);
      const starBtn = document.createElement('button');
      starBtn.className   = 'star-btn' + (starred ? ' active' : '');
      starBtn.textContent = starred ? '★' : '☆';
      starBtn.setAttribute('aria-label', 'toggle star');
      starBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleStar(colId, text);
        renderCol(colId);
      });
      pill.appendChild(span);
      pill.appendChild(starBtn);
    } else {
      pill.appendChild(span);
    }

    const x = document.createElement('button');
    x.className = 'x';
    x.setAttribute('aria-label', 'remove');
    x.textContent = '×';
    x.addEventListener('click', (e) => {
      e.stopPropagation();
      const [removed] = board[colId].splice(index, 1);
      board.archive.push({ text: removed, colId, date: todayISO(), source: 'deleted' });
      // Clean up star entry
      starredSet.delete(starKey(colId, removed));
      board.starred = [...starredSet];
      saveBoard();
      renderCol(colId);
      renderBin();
    });

    pill.appendChild(x);

    pill.addEventListener('dragstart', (e) => {
      drag = { source: 'col', colId, index };
      requestAnimationFrame(() => pill.classList.add('dragging'));
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });
    pill.addEventListener('dragend', () => {
      pill.classList.remove('dragging');
      clearDropLine();
      drag = null;
    });

    return pill;
  }

  // ─────────────────────────────────────────────────
  //  Render columns
  // ─────────────────────────────────────────────────
  function renderCol(colId) {
    const body    = document.getElementById('body-' + colId);
    const countEl = document.getElementById('count-' + colId);
    const items   = board[colId];
    body.innerHTML = '';
    if (items.length === 0) {
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = HINTS[colId] || 'drag here';
      body.appendChild(hint);
    } else {
      items.forEach((text, i) => body.appendChild(makePill(text, colId, i)));
    }
    if (countEl) countEl.textContent = items.length || '';
  }

  function render() { COLS.forEach(renderCol); }

  // ─────────────────────────────────────────────────
  //  Stock controls
  // ─────────────────────────────────────────────────
  function renderStockControls() {
    const ctrl = document.getElementById('stock-controls');
    ctrl.innerHTML = '';

    if (stock.state === null) {
      const btn = document.createElement('button');
      btn.className = 'take-stock-btn';
      btn.textContent = `Take stock for ${todayLabel()}`;
      btn.addEventListener('click', () => {
        stock.state = 'active';
        persistStock();
        render();
        renderStockControls();
      });
      ctrl.appendChild(btn);

    } else if (stock.state === 'active') {
      const total = habitTotal();
      const done  = habitDone();
      const btn = document.createElement('button');
      btn.className = 'done-btn';
      btn.textContent = `Done  ·  ${done} / ${total}`;
      btn.addEventListener('click', () => {
        // Record summary before archiving changes the counts
        const summary = { done: habitDone(), total: habitTotal() };
        archiveCheckedItems();
        stock.checked = new Set();
        stock.state   = 'done';
        stock.summary = summary;
        persistStock();
        render();
        renderStockControls();
        renderBin();
        openBin();
      });
      ctrl.appendChild(btn);

    } else if (stock.state === 'done') {
      const { done = 0, total = 0 } = stock.summary || {};
      const pct = total > 0 ? Math.round((done / total) * 100) : 0;

      const row = document.createElement('div');
      row.className = 'stock-result';

      const barWrap = document.createElement('div');
      barWrap.className = 'progress-bar-wrap';
      const barFill = document.createElement('div');
      barFill.className = 'progress-bar-fill';
      barFill.style.width = '0%';
      barWrap.appendChild(barFill);

      const label = document.createElement('span');
      label.className = 'progress-label';
      label.textContent = `${done} / ${total} archived`;

      const editBtn = document.createElement('button');
      editBtn.className = 'edit-stock-btn';
      editBtn.textContent = 'Edit';
      editBtn.addEventListener('click', () => {
        // Restore archived today's items back to columns so user can re-tick
        const todayArchive = board.archive.filter(a => a.date === todayISO() && isHabitCol(a.colId));
        todayArchive.forEach(a => {
          board[a.colId].push(a.text);
          stock.checked.add(stockKey(a.colId, a.text));
        });
        board.archive = board.archive.filter(a => !(a.date === todayISO() && isHabitCol(a.colId)));
        stock.state   = 'active';
        stock.summary = null;
        persistStock();
        render();
        renderStockControls();
        renderBin();
      });

      row.appendChild(barWrap);
      row.appendChild(label);
      row.appendChild(editBtn);
      ctrl.appendChild(row);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        barFill.style.width = pct + '%';
      }));
    }
  }

  // ─────────────────────────────────────────────────
  //  Drag & drop
  // ─────────────────────────────────────────────────
  COLS.forEach(colId => {
    const col  = document.querySelector(`.col[data-col="${colId}"]`);
    const body = document.getElementById('body-' + colId);
    let enterCount = 0;

    col.addEventListener('dragenter', (e) => {
      if (!drag) return;
      e.preventDefault();
      enterCount++;
      col.classList.add('drag-over');
    });

    col.addEventListener('dragleave', () => {
      if (!drag) return;
      if (--enterCount <= 0) {
        enterCount = 0;
        col.classList.remove('drag-over');
        if (dropTarget?.colId === colId) clearDropLine();
      }
    });

    col.addEventListener('dragover', (e) => {
      if (!drag) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      const idx = getInsertIndex(body, e.clientY);
      if (dropTarget?.colId !== colId || dropTarget?.insertIndex !== idx) {
        showDropLine(body, idx, colId);
      }
    });

    col.addEventListener('drop', (e) => {
      e.preventDefault();
      enterCount = 0;
      col.classList.remove('drag-over');
      if (!drag) { clearDropLine(); return; }

      const insertAt = dropTarget?.insertIndex ?? board[colId].length;
      clearDropLine();

      if (drag.source === 'archive') {
        // ── Archive → column ──
        const item = board.archive[drag.idx];
        if (!item) return;
        board.archive.splice(drag.idx, 1);
        stock.checked.delete(stockKey(item.colId, item.text));
        board[colId].splice(insertAt, 0, item.text);
        persistStock();
        renderCol(colId);
        renderBin();
      } else {
        // ── Column → column ──
        const { colId: srcId, index: srcIdx } = drag;
        if (srcId === colId) {
          const [item] = board[colId].splice(srcIdx, 1);
          const adj    = insertAt > srcIdx ? insertAt - 1 : insertAt;
          board[colId].splice(adj, 0, item);
          saveBoard();
          renderCol(colId);
        } else {
          const [item] = board[srcId].splice(srcIdx, 1);
          board[colId].splice(insertAt, 0, item);
          saveBoard();
          renderCol(srcId);
          renderCol(colId);
        }
      }
    });
  });

  // ─────────────────────────────────────────────────
  //  Archive bin tray
  // ─────────────────────────────────────────────────
  let binOpen = false;

  function openBin() {
    binOpen = true;
    document.getElementById('bin-tray').classList.add('open');
  }

  document.getElementById('bin-header').addEventListener('click', () => {
    binOpen = !binOpen;
    document.getElementById('bin-tray').classList.toggle('open', binOpen);
  });

  function renderBin() {
    const body    = document.getElementById('bin-body');
    const countEl = document.getElementById('bin-count');
    const archive = board.archive || [];

    body.innerHTML = '';

    if (archive.length === 0) {
      const empty = document.createElement('span');
      empty.className = 'bin-empty';
      empty.textContent = 'nothing archived yet';
      body.appendChild(empty);
      countEl.style.display = 'none';
    } else {
      countEl.textContent   = archive.length;
      countEl.style.display = '';

      archive.forEach((item, idx) => {
        const meta = COL_META[item.colId] || { label: item.colId, color: '#8a8a93' };

        const pill = document.createElement('div');
        pill.className = 'archive-pill';
        pill.draggable = true;
        pill.addEventListener('dragstart', (e) => {
          drag = { source: 'archive', idx };
          requestAnimationFrame(() => pill.classList.add('dragging'));
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', '');
        });
        pill.addEventListener('dragend', () => {
          clearDropLine();
          drag = null;
          document.querySelectorAll('.archive-pill.dragging').forEach(el => el.classList.remove('dragging'));
        });

        const tag = document.createElement('span');
        tag.className   = 'archive-tag';
        tag.textContent = meta.label;
        tag.style.color = meta.color;

        const txt = document.createElement('span');
        txt.className   = 'archive-text';
        txt.textContent = item.text;
        txt.title       = item.text;

        const restore = document.createElement('button');
        restore.className   = 'unarchive-btn';
        restore.textContent = '↩';
        restore.title       = `Restore to ${meta.label}`;
        restore.addEventListener('click', () => unarchive(idx));

        const del = document.createElement('button');
        del.className   = 'unarchive-btn';
        del.textContent = '×';
        del.title       = 'Delete permanently';
        del.style.opacity = '0.5';
        del.addEventListener('click', () => permanentDelete(idx));

        pill.appendChild(tag);
        pill.appendChild(txt);
        pill.appendChild(restore);
        pill.appendChild(del);
        body.appendChild(pill);
      });
    }
  }

  // ─────────────────────────────────────────────────
  //  Board input
  // ─────────────────────────────────────────────────
  document.getElementById('entry').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const v = e.target.value.trim();
    if (!v) return;
    board.braindump.push(v);
    saveBoard();
    renderCol('braindump');
    e.target.value = '';
  });

  // ─────────────────────────────────────────────────
  //  Dump view
  // ─────────────────────────────────────────────────
  function renderDumpView() {
    const container = document.getElementById('dump-pills');
    container.innerHTML = '';
    board.braindump.forEach((text, i) => {
      const pill = document.createElement('div');
      pill.className = 'dump-pill';

      const span = document.createElement('span');
      span.className = 'text';
      span.textContent = text;

      const x = document.createElement('button');
      x.className = 'x';
      x.setAttribute('aria-label', 'remove');
      x.textContent = '×';
      x.addEventListener('click', () => {
        const [removed] = board.braindump.splice(i, 1);
        board.archive.push({ text: removed, colId: 'braindump', date: todayISO(), source: 'deleted' });
        saveBoard();
        renderDumpView();
        renderBin();
      });

      pill.appendChild(span);
      pill.appendChild(x);
      container.appendChild(pill);
    });
  }

  function setView(mode) {
    const dumpEl  = document.getElementById('dump-view');
    const rootEl  = document.getElementById('board-root');
    if (mode === 'dump') {
      dumpEl.classList.add('active');
      rootEl.style.display = 'none';
      renderDumpView();
      document.getElementById('dump-entry').focus();
    } else {
      dumpEl.classList.remove('active');
      rootEl.style.display = 'contents';
      renderCol('braindump');
    }
  }

  document.getElementById('maximise-btn').addEventListener('click', () => setView('dump'));
  document.getElementById('dump-back').addEventListener('click',    () => setView('board'));

  document.getElementById('dump-entry').addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    const v = e.target.value.trim();
    if (!v) return;
    board.braindump.push(v);
    saveBoard();
    renderDumpView();
    renderCol('braindump');
    e.target.value = '';
  });

  // ─────────────────────────────────────────────────
  //  Init
  // ─────────────────────────────────────────────────
  render();
  renderStockControls();
  renderStarControls();
  renderBin();
</script>
</body>
</html>
